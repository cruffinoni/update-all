name: Publish Python package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Test and build distribution
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test and build dependencies
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Verify release version
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path
          import tomllib

          tag = os.environ["RELEASE_TAG"]
          match = re.fullmatch(r"v(\d+\.\d+\.\d+)", tag)
          if match is None:
              raise SystemExit(f"Invalid release tag {tag!r}; expected vX.Y.Z")

          tag_version = match.group(1)
          with Path("pyproject.toml").open("rb") as file:
              project_version = tomllib.load(file)["project"]["version"]

          init_text = Path("src/update_all/__init__.py").read_text()
          init_match = re.search(
              r'^__version__\s*=\s*["\']([^"\']+)["\']',
              init_text,
              re.MULTILINE,
          )
          if init_match is None:
              raise SystemExit("Could not find __version__ in src/update_all/__init__.py")

          init_version = init_match.group(1)
          versions = {
              "tag": tag_version,
              "pyproject.toml": project_version,
              "src/update_all/__init__.py": init_version,
          }
          if len(set(versions.values())) != 1:
              details = ", ".join(f"{name}={version}" for name, version in versions.items())
              raise SystemExit(f"Release versions do not match: {details}")

          print(f"Validated release version {tag_version}")
          PY

      - name: Build wheel and source distribution
        run: python -m build

      - name: Smoke-test built wheel
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          smoke_venv="$RUNNER_TEMP/update-all-smoke-venv"
          python -m venv "$smoke_venv"
          "$smoke_venv/bin/python" -m pip install dist/*.whl
          expected="update-all ${RELEASE_TAG#v}"
          actual=$("$smoke_venv/bin/update-all" --version)
          test "$actual" = "$expected"

      - name: Store distribution artifacts
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/update-all
    permissions:
      id-token: write

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
